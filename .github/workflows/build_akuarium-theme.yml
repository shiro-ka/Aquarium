name: akuarium-theme.cssをビルド
on:
  push:
    branches: [main]
    paths: ['akuarium-theme/**']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: akuarium-themeフォルダをbuildブランチにコピー
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git checkout build
          git checkout main -- akuarium-theme/
          git add akuarium-theme/
          git commit -m "akuarium-themeフォルダをコピーしたよ" || echo "変更なし"

      # Node.js
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      # Lightning CSSでビルド
      - run: npm install lightningcss-cli
      - run: npx lightningcss --bundle --minify --targets '>= 0.25%' akuarium-theme/index.css -o akuarium-theme.css

      - name: ビルドしたakuarium-theme.cssをbuildブランチにコミット
        run: |
          git add akuarium-theme.css
          git commit -m "akuarium-theme.cssをビルドしたよ" || echo "変更なし"

      - name: mainにakuarium-theme.cssをプッシュ
        run: |
          git stash
          git checkout main
          git checkout build -- akuarium-theme.css
          git add akuarium-theme.css
          git commit -m "akuarium-theme.cssをmainブランチに送ったよ"
          git push origin main