name: aquarium-ui.cssをビルド
on:
  push:
    branches: [main]
    paths: ['aquarium-ui/**']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: aquarium-uiフォルダをbuildブランチにコピー
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git checkout build
          git checkout main -- aquarium-ui/
          git add aquarium-ui/
          git commit -m "sync: update from main" || echo "変更なし"

      # Node.js
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      # Lightning CSSでビルド
      - run: npm install lightningcss-cli
      - run: npx lightningcss --bundle aquarium-ui/index.css -o aquarium-ui.css

      - name: ビルド結果をbuildブランチにコミット
        run: |
          git add aquarium-ui.css
          git commit -m "build: generate aquarium-ui.css" || echo "変更なし"

      - name: mainにaquarium-ui.cssをプッシュ
        run: |
          git stash
          git checkout main
          git checkout build -- aquarium-ui.css
          git add aquarium-ui.css
          git commit -m "build: update aquarium-ui.css"
          git push origin main